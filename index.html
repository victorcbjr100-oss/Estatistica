<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Study</title>

  <link rel="stylesheet" href="style.css">
  <link rel="manifest" href="manifest.json">

  <!-- Ícones -->
  <script src="https://unpkg.com/lucide@latest"></script>
</head>

<body>

<div class="app">

  <!-- Header -->
  <header class="header">
    <h1>Study</h1>
  </header>

  <!-- Conteúdo -->
  <main class="main">

    <div class="grid">

      <div class="card">
        <div class="card-top">
          <i data-lucide="book-open"></i>
          <span>Total</span>
        </div>
        <h2 id="total">0</h2>
      </div>

      <div class="card">
        <div class="card-top">
          <i data-lucide="target"></i>
          <span>Aproveitamento</span>
        </div>
        <h2 id="accuracy">0%</h2>
      </div>

    </div>

    <div class="card">
      <div class="card-top">
        <i data-lucide="filter"></i>
        <span>Filtrar matéria</span>
      </div>

      <select id="filterSubject" onchange="loadDashboard()">
        <option value="">Todas</option>
      </select>
    </div>

    <div class="card">
      <canvas id="pieChart"></canvas>
    </div>

    <div class="card">
      <canvas id="lineChart"></canvas>
    </div>

  </main>

  <!-- Bottom nav -->
  <nav class="nav">

    <button onclick="loadDashboard()">
      <i data-lucide="home"></i>
      <span>Home</span>
    </button>

    <button onclick="goAdd()" class="primary">
      <i data-lucide="plus"></i>
    </button>

    <button onclick="goHistory()">
      <i data-lucide="clock"></i>
      <span>Histórico</span>
    </button>

  </nav>

</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="app.js"></script>

<script>
lucide.createIcons();
initDashboard();

if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("sw.js");
}
</script>

</body>
</html>
