<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Study Tracker</title>

  <link rel="stylesheet" href="style.css">
  <link rel="manifest" href="manifest.json">
</head>

<body>

<div class="app">

  <header class="topbar">
    <h1>Study Tracker</h1>
  </header>

  <main class="main">

    <div class="card">
      <h3>Total de questões</h3>
      <p id="total">0</p>
    </div>

    <div class="card">
      <h3>Aproveitamento</h3>
      <p id="accuracy">0%</p>
    </div>

    <div class="card">
      <h3>Meta diária</h3>
      <input type="number" id="goal" placeholder="Ex: 50">
    </div>

    <div class="card">
      <select id="filterSubject" onchange="loadDashboard()">
        <option value="">Todas matérias</option>
      </select>
    </div>

    <canvas id="pieChart"></canvas>
    <canvas id="lineChart"></canvas>

  </main>

  <nav class="bottom-nav">
    <button onclick="goAdd()">➕</button>
    <button onclick="loadDashboard()">🏠</button>
    <button onclick="goHistory()">📅</button>
  </nav>

</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="app.js"></script>

<script>
initDashboard();

// PWA
if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("sw.js");
}
</script>

</body>
</html>
